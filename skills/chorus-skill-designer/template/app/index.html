<!doctype html>
<!--
  Chorus app-skill TEMPLATE — a self-contained, dual-mode single-file UI.
  Customize the CONFIG block below per domain (title, id prefix, fields, queries). No build step.

  MODES (see the designer skill's two-mode contract):
    • Claude-mediated: Claude injects a snapshot as window.CHORUS_DATA and performs writes when the
      app emits a `chorus:write` intent. No credentials in the page.
    • Standalone: set window.CHORUS_ENDPOINT = {url, token} to speak MCP JSON-RPC directly.
    • Neither present → seeded sample data + a visible "connect" notice. Never blank-screen.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chorus App</title>
    <style>
      :root {
        --bg: #0f1115; --panel: #171a21; --ink: #e8eaed; --muted: #9aa0aa;
        --accent: #7aa2f7; --line: #262b36; --good: #7ee787; --warn: #f7b955;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--ink); }
      header { padding: 16px 20px; border-bottom: 1px solid var(--line); display: flex; gap: 12px; align-items: baseline; }
      header h1 { font-size: 18px; margin: 0; }
      header .mode { font-size: 12px; color: var(--muted); margin-left: auto; }
      .wrap { display: grid; grid-template-columns: 1fr 1.4fr; gap: 0; min-height: calc(100vh - 58px); }
      @media (max-width: 720px) { .wrap { grid-template-columns: 1fr; } }
      .list { border-right: 1px solid var(--line); overflow-y: auto; }
      .item { padding: 12px 20px; border-bottom: 1px solid var(--line); cursor: pointer; }
      .item:hover { background: var(--panel); }
      .item .t { font-weight: 600; }
      .item .s { color: var(--muted); font-size: 13px; margin-top: 2px; }
      .detail { padding: 20px; }
      .row { display: flex; gap: 10px; padding: 6px 0; border-bottom: 1px dashed var(--line); }
      .row .k { color: var(--muted); min-width: 130px; }
      .row .v a { color: var(--accent); text-decoration: none; }
      .badge { font-size: 11px; padding: 1px 6px; border-radius: 6px; background: var(--panel); color: var(--muted); margin-left: 6px; }
      form { margin-top: 20px; padding: 16px; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; }
      form h3 { margin: 0 0 10px; font-size: 14px; }
      form label { display: block; font-size: 12px; color: var(--muted); margin: 8px 0 3px; }
      form input, form textarea { width: 100%; background: var(--bg); color: var(--ink); border: 1px solid var(--line); border-radius: 6px; padding: 7px 9px; font: inherit; }
      form button { margin-top: 12px; background: var(--accent); color: #0b0d12; border: 0; border-radius: 7px; padding: 8px 14px; font-weight: 600; cursor: pointer; }
      .pending { margin-top: 14px; font-size: 13px; }
      .pending pre { background: var(--bg); border: 1px solid var(--line); border-radius: 6px; padding: 10px; overflow-x: auto; white-space: pre-wrap; }
      .notice { padding: 10px 20px; background: #1d1a10; color: var(--warn); font-size: 13px; border-bottom: 1px solid var(--line); }
    </style>
  </head>
  <body>
    <!-- ── CONFIG: customize per domain ─────────────────────────────────────────── -->
    <script>
      const CONFIG = {
        title: "Chorus Collection",
        typePrefix: "item:", // entity id prefix for this domain's primary type
        titleAttr: "title", // which attribute to show as the item's headline
        subtitleAttr: "year", // secondary line
        // Fields the "add" form captures → each becomes a remember() on submit.
        fields: [
          { attr: "title", label: "Title", kind: "fact" },
          { attr: "year", label: "Year", kind: "fact" },
          { attr: "note", label: "Note", kind: "observation" },
        ],
        // Sample data shown when no live Chorus is connected.
        sample: [
          { id: "item:example", title: "An example item", year: "2024", note: "Replace me with your domain." },
        ],
      };
    </script>
    <!-- ── END CONFIG ───────────────────────────────────────────────────────────── -->

    <header>
      <h1 id="title">Chorus Collection</h1>
      <span class="mode" id="mode">mode: —</span>
    </header>
    <div id="notice" class="notice" style="display: none"></div>
    <div class="wrap">
      <div class="list" id="list"></div>
      <div class="detail" id="detail"><p style="color: var(--muted)">Select an item.</p></div>
    </div>

    <script>
      // ── Data source: Claude-injected snapshot, standalone endpoint, or sample. ──
      const endpoint = window.CHORUS_ENDPOINT || null;
      let items = Array.isArray(window.CHORUS_DATA) ? window.CHORUS_DATA : null;
      let mode = items ? "claude" : endpoint ? "standalone" : "sample";
      if (!items) items = CONFIG.sample.slice();

      document.getElementById("title").textContent = CONFIG.title;
      document.getElementById("mode").textContent = "mode: " + mode;
      if (mode === "sample") {
        const n = document.getElementById("notice");
        n.style.display = "block";
        n.textContent =
          "Showing sample data — not connected to Chorus. Ask Claude to load your data, or set window.CHORUS_ENDPOINT to deploy standalone.";
      }

      const esc = (s) => String(s ?? "").replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
      const listEl = document.getElementById("list");
      const detailEl = document.getElementById("detail");

      function renderList() {
        listEl.innerHTML = "";
        for (const it of items) {
          const d = document.createElement("div");
          d.className = "item";
          d.innerHTML =
            '<div class="t">' + esc(it[CONFIG.titleAttr] || it.id) + "</div>" +
            '<div class="s">' + esc(it[CONFIG.subtitleAttr] || it.id) + "</div>";
          d.onclick = () => renderDetail(it);
          listEl.appendChild(d);
        }
      }

      function renderDetail(it) {
        let html = "<h2>" + esc(it[CONFIG.titleAttr] || it.id) + "</h2>";
        for (const [k, v] of Object.entries(it)) {
          if (k === "id") continue;
          const val = v && typeof v === "object" && v.entity
            ? '<a href="#" onclick="return false">' + esc(v.entity) + "</a>"
            : Array.isArray(v)
              ? v.map((x) => esc(x && x.entity ? x.entity : x)).join(", ")
              : esc(v);
          html += '<div class="row"><div class="k">' + esc(k) + '</div><div class="v">' + val + "</div></div>";
        }
        html += addForm(it.id);
        detailEl.innerHTML = html;
        wireForm();
      }

      function addForm(aboutId) {
        let f = '<form id="addf"><h3>Add / update a belief</h3>' +
          '<input type="hidden" name="about" value="' + esc(aboutId || "") + '" />' +
          '<label>Entity id (about)</label><input name="aboutEntity" value="' + esc(aboutId || CONFIG.typePrefix) + '" />';
        for (const fld of CONFIG.fields) {
          f += "<label>" + esc(fld.label) + "</label>" +
            (fld.attr === "note"
              ? '<textarea name="' + esc(fld.attr) + '" rows="2"></textarea>'
              : '<input name="' + esc(fld.attr) + '" />');
        }
        f += '<button type="submit">Save</button><div class="pending" id="pending"></div></form>';
        return f;
      }

      // A write becomes one remember() per non-empty field. In Claude mode we emit an intent (Claude
      // performs it); in standalone mode we POST it; always we show the exact calls for transparency.
      function wireForm() {
        const form = document.getElementById("addf");
        if (!form) return;
        form.onsubmit = async (e) => {
          e.preventDefault();
          const data = Object.fromEntries(new FormData(form).entries());
          const about = data.aboutEntity || data.about;
          const writes = CONFIG.fields
            .filter((fld) => data[fld.attr] && String(data[fld.attr]).trim() !== "")
            .map((fld) => ({ tool: "remember", args: { about, attribute: fld.attr, value: data[fld.attr], kind: fld.kind } }));
          const pending = document.getElementById("pending");
          pending.innerHTML = "<pre>" + esc(JSON.stringify(writes, null, 2)) + "</pre>";
          window.CHORUS_PENDING = (window.CHORUS_PENDING || []).concat(writes);
          window.dispatchEvent(new CustomEvent("chorus:write", { detail: writes }));
          if (mode === "standalone") {
            for (const w of writes) await mcpCall(w.tool, w.args);
            pending.innerHTML += '<div style="color:var(--good)">saved to ' + esc(endpoint.url) + "</div>";
          } else {
            pending.innerHTML += '<div style="color:var(--warn)">Ask Claude to save these (or say "save").</div>';
          }
        };
      }

      // Minimal MCP JSON-RPC for standalone mode.
      async function mcpCall(tool, args) {
        const res = await fetch(endpoint.url, {
          method: "POST",
          headers: { "Content-Type": "application/json", "Mcp-Session-Id": endpoint.session || "", Authorization: "Bearer " + endpoint.token },
          body: JSON.stringify({ jsonrpc: "2.0", id: Date.now(), method: "tools/call", params: { name: tool, arguments: args } }),
        });
        return res.json();
      }

      renderList();
      if (items[0]) renderDetail(items[0]);
    </script>
  </body>
</html>
