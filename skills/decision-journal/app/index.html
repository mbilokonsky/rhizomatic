<!doctype html>
<!--
  Decision Journal — a Chorus app-skill. Self-contained, dual-mode, single-file. No build step.

  THESIS: you cannot rewrite what you knew; you can only append what you later learned.
  Every decision pins the epistemic basis it was made on (Chorus `decide` → a `decisionId` stored as
  `basis`). Review re-resolves that instant (`replay`) and shows it beside what's true NOW. Outcomes and
  reviews are APPENDED observations, never edits — so the track record stays honest.

  MODES (two-mode contract):
    • Claude-mediated: Claude injects a snapshot as window.CHORUS_DATA and performs writes/replays when
      the app emits a `chorus:write` / `chorus:replay` intent. No credentials in the page.
    • Standalone: set window.CHORUS_ENDPOINT = {url, token, session} to speak MCP JSON-RPC directly.
    • Neither present → seeded sample data + a visible "connect" notice. Never blank-screen.

  window.CHORUS_DATA shape (array of decisions):
    {
      id, title, question, chosen, rationale,
      confidence,               // number 0..1
      decidedAt,                // ms epoch
      basis,                    // decisionId from `decide`
      options: [ "…" | {entity} ],
      outcome:   [ {value, at?} | "…" ],   // APPENDED log, newest-first
      reviewNote:[ {value, at?} | "…" ],   // APPENDED log, newest-first
      then?: {                  // OPTIONAL: filled by Claude via `replay {basis}`
        values: { attr: displayValue, … },    // what the basis resolved
        retractedSince: [ "attr: value", … ], // claims retracted AFTER the decision
        at,                                    // pinned instant
      }
    }
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Decision Journal</title>
    <style>
      :root {
        --bg: #0e1013; --panel: #161a20; --panel2: #1b2027; --ink: #e9ebee; --muted: #8b929e;
        --accent: #8ab4ff; --then: #c08cff; --now: #6fd68b; --line: #242a34;
        --warn: #f4c15a; --bad: #ff8b8b; --pin: #ffd479;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--ink); }
      a { color: var(--accent); text-decoration: none; }
      header { padding: 14px 20px; border-bottom: 1px solid var(--line); display: flex; gap: 12px; align-items: baseline; flex-wrap: wrap; }
      header h1 { font-size: 18px; margin: 0; letter-spacing: .2px; }
      header .tag { font-size: 12px; color: var(--muted); }
      header .ethic { font-size: 12px; color: var(--pin); margin-left: auto; }
      .wrap { display: grid; grid-template-columns: 340px 1fr; min-height: calc(100vh - 52px); }
      @media (max-width: 860px) { .wrap { grid-template-columns: 1fr; } }
      .notice { padding: 9px 20px; background: #201c10; color: var(--warn); font-size: 13px; border-bottom: 1px solid var(--line); }

      /* Timeline / list */
      .rail { border-right: 1px solid var(--line); overflow-y: auto; }
      .railhead { padding: 12px 18px 6px; display: flex; align-items: baseline; gap: 8px; }
      .railhead h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 0; }
      .newbtn { margin-left: auto; font-size: 12px; color: var(--accent); cursor: pointer; background: none; border: 0; }
      .item { padding: 12px 18px; border-bottom: 1px solid var(--line); cursor: pointer; position: relative; }
      .item::before { content: ""; position: absolute; left: 8px; top: 18px; width: 7px; height: 7px; border-radius: 50%; background: var(--line); }
      .item.due::before { background: var(--warn); }
      .item.reviewed::before { background: var(--now); }
      .item:hover { background: var(--panel); }
      .item.sel { background: var(--panel2); }
      .item .t { font-weight: 600; font-size: 14px; }
      .item .s { color: var(--muted); font-size: 12px; margin-top: 3px; display: flex; gap: 8px; align-items: center; }
      .conf { font-variant-numeric: tabular-nums; }
      .pill { font-size: 10px; padding: 1px 7px; border-radius: 999px; border: 1px solid var(--line); color: var(--muted); }
      .pill.due { color: var(--warn); border-color: #4a3f1c; }
      .pill.reviewed { color: var(--now); border-color: #234a2e; }

      /* Detail */
      .detail { padding: 20px 24px; overflow-y: auto; }
      .detail .empty { color: var(--muted); }
      .detail h2 { margin: 0 0 4px; font-size: 20px; }
      .detail .q { color: var(--muted); font-size: 14px; margin: 0 0 16px; }
      .meta { display: flex; gap: 18px; flex-wrap: wrap; font-size: 13px; color: var(--muted); margin-bottom: 18px; }
      .meta b { color: var(--ink); font-weight: 600; }

      .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
      @media (max-width: 720px) { .cols { grid-template-columns: 1fr; } }
      .col { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 14px; }
      .col h3 { margin: 0 0 4px; font-size: 12px; text-transform: uppercase; letter-spacing: .08em; }
      .col.then h3 { color: var(--then); }
      .col.now h3 { color: var(--now); }
      .col .sub { font-size: 11px; color: var(--muted); margin: 0 0 10px; }
      .kv { display: flex; gap: 8px; padding: 5px 0; border-bottom: 1px dashed var(--line); font-size: 13px; }
      .kv .k { color: var(--muted); min-width: 92px; }
      .kv .v { flex: 1; }
      .retracted { color: var(--bad); text-decoration: line-through; }
      .sincebox { margin-top: 10px; font-size: 12px; color: var(--bad); }
      .sincebox b { color: var(--bad); }
      .replayhint { font-size: 12px; color: var(--muted); }
      .replaybtn { margin-top: 8px; font-size: 12px; background: var(--panel2); color: var(--then); border: 1px solid #3a2b52; border-radius: 7px; padding: 6px 10px; cursor: pointer; }

      /* Append log */
      .log { margin-top: 20px; }
      .log h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 0 0 4px; }
      .log .ethic { font-size: 11px; color: var(--pin); margin: 0 0 10px; }
      .entry { border-left: 2px solid var(--line); padding: 4px 0 10px 12px; margin-left: 3px; position: relative; }
      .entry::before { content: ""; position: absolute; left: -5px; top: 8px; width: 8px; height: 8px; border-radius: 50%; background: var(--panel2); border: 1px solid var(--line); }
      .entry.outcome::before { background: var(--now); }
      .entry.review::before { background: var(--then); }
      .entry .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
      .entry .val { font-size: 13px; margin-top: 2px; white-space: pre-wrap; }
      .entry .when { font-size: 11px; color: var(--muted); margin-top: 2px; }
      .log .none { font-size: 12px; color: var(--muted); }

      /* Forms */
      form { margin-top: 18px; padding: 16px; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; }
      form h3 { margin: 0 0 3px; font-size: 14px; }
      form .why { font-size: 11px; color: var(--muted); margin: 0 0 10px; }
      form label { display: block; font-size: 12px; color: var(--muted); margin: 9px 0 3px; }
      form input, form textarea, form select { width: 100%; background: var(--bg); color: var(--ink); border: 1px solid var(--line); border-radius: 6px; padding: 7px 9px; font: inherit; }
      form textarea { resize: vertical; }
      .conf-row { display: flex; align-items: center; gap: 10px; }
      .conf-row input[type=range] { flex: 1; }
      .conf-out { font-variant-numeric: tabular-nums; min-width: 34px; color: var(--ink); }
      form button.go { margin-top: 13px; background: var(--accent); color: #0b0d12; border: 0; border-radius: 7px; padding: 8px 14px; font-weight: 600; cursor: pointer; }
      form.append button.go { background: var(--now); }
      .pending { margin-top: 12px; font-size: 12px; }
      .pending pre { background: var(--bg); border: 1px solid var(--line); border-radius: 6px; padding: 10px; overflow-x: auto; white-space: pre-wrap; }
      .ok { color: var(--now); } .wait { color: var(--warn); }
      .tabs { display: flex; gap: 6px; margin-top: 18px; }
      .tabs button { background: var(--panel); color: var(--muted); border: 1px solid var(--line); border-radius: 7px 7px 0 0; padding: 7px 12px; cursor: pointer; font: inherit; font-size: 13px; }
      .tabs button.active { color: var(--ink); border-bottom-color: var(--bg); background: var(--panel); }
    </style>
  </head>
  <body>
    <!-- ── CONFIG ─────────────────────────────────────────────────────────────────── -->
    <script>
      const CONFIG = {
        typePrefix: "decision:",
        reviewAfterDays: 30, // a decision older than this with no outcome/review is "due for review"
        // Sample data — shown only when no live Chorus is connected. Illustrates THEN vs NOW.
        sample: [
          {
            id: "decision:switch-to-sqlite",
            title: "Switch the store backend to SQLite",
            question: "Should the persistence tier default to SQLite or stay on JSONL?",
            options: ["JSONL (append-only file)", "SQLite (better-sqlite3)"],
            chosen: "SQLite (better-sqlite3)",
            rationale: "Backlink reads were O(n) scans on JSONL. SQLite gives indexed reads and passes the same conformance vectors.",
            confidence: 0.7,
            decidedAt: Date.now() - 1000 * 60 * 60 * 24 * 42,
            basis: "dec_9f2a…(pinned by `decide`)",
            outcome: [
              { value: "Shipped; indexed backlinks are ~40x faster on the demo store. No conformance regressions.", at: Date.now() - 1000 * 60 * 60 * 24 * 5 },
            ],
            reviewNote: [
              { value: "I underweighted migration risk at decision time — the JSONL→SQLite migration took a full extra day I hadn't budgeted. Confidence 0.7 was about right on the outcome, too low on the cost.", at: Date.now() - 1000 * 60 * 60 * 24 * 4 },
            ],
            then: {
              at: Date.now() - 1000 * 60 * 60 * 24 * 42,
              values: {
                "backend-benchmark": "JSONL scan: 220ms p50 on 10k backlinks",
                "conformance": "both witnesses green on M0–M5",
                "team-capacity": "1 engineer, 2 weeks",
              },
              retractedSince: ["backend-benchmark: JSONL scan: 220ms p50 (superseded by a re-measure)"],
            },
          },
          {
            id: "decision:defer-federation",
            title: "Defer federation v1 to next unit",
            question: "Ship federation now, or finish the persistence tier first?",
            options: ["Federation v1 now", "Persistence tier first, federation next"],
            chosen: "Persistence tier first, federation next",
            rationale: "Federation without durable local state means nothing to converge from. Order the substrate before the network.",
            confidence: 0.85,
            decidedAt: Date.now() - 1000 * 60 * 60 * 24 * 3,
            basis: "dec_41c7…(pinned by `decide`)",
            outcome: [],
            reviewNote: [],
            then: null, // not yet replayed — click "Replay the basis"
          },
        ],
      };
    </script>
    <!-- ── END CONFIG ─────────────────────────────────────────────────────────────── -->

    <header>
      <h1>Decision Journal</h1>
      <span class="tag" id="mode">mode: —</span>
      <span class="ethic">append-only · the past is never rewritten</span>
    </header>
    <div id="notice" class="notice" style="display: none"></div>
    <div class="wrap">
      <div class="rail">
        <div class="railhead">
          <h2>Timeline</h2>
          <button class="newbtn" id="newbtn">+ record a decision</button>
        </div>
        <div id="list"></div>
      </div>
      <div class="detail" id="detail"><p class="empty">Select a decision, or record a new one.</p></div>
    </div>

    <script>
      // ── Data source: Claude snapshot, standalone endpoint, or sample. Never blank-screen. ──
      const endpoint = window.CHORUS_ENDPOINT || null;
      let decisions = Array.isArray(window.CHORUS_DATA) ? window.CHORUS_DATA : null;
      let mode = decisions ? "claude" : endpoint ? "standalone" : "sample";
      if (!decisions) decisions = CONFIG.sample.slice();

      document.getElementById("mode").textContent = "mode: " + mode;
      if (mode === "sample") {
        const n = document.getElementById("notice");
        n.style.display = "block";
        n.textContent =
          "Showing sample data — not connected to Chorus. Ask Claude to load your journal, or set window.CHORUS_ENDPOINT to deploy standalone.";
      }

      const esc = (s) => String(s ?? "").replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
      const asVal = (v) => (v && typeof v === "object" && v.entity) ? '<a href="#" onclick="return false">' + esc(v.entity) + "</a>" : esc(v);
      const DAY = 1000 * 60 * 60 * 24;
      const fmtDate = (ms) => ms ? new Date(ms).toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" }) : "—";
      const daysAgo = (ms) => ms ? Math.round((Date.now() - ms) / DAY) : null;

      function logEntries(v) {
        if (!v) return [];
        return (Array.isArray(v) ? v : [v]).map((e) => (e && typeof e === "object" && "value" in e) ? e : { value: e });
      }
      function status(d) {
        const reviewed = logEntries(d.outcome).length + logEntries(d.reviewNote).length > 0;
        if (reviewed) return "reviewed";
        const age = daysAgo(d.decidedAt);
        if (age != null && age >= CONFIG.reviewAfterDays) return "due";
        return "open";
      }

      const listEl = document.getElementById("list");
      const detailEl = document.getElementById("detail");
      let selectedId = null;

      function renderList() {
        // Newest first — a journal reads top-down in time.
        const sorted = decisions.slice().sort((a, b) => (b.decidedAt || 0) - (a.decidedAt || 0));
        listEl.innerHTML = "";
        for (const d of sorted) {
          const st = status(d);
          const el = document.createElement("div");
          el.className = "item " + (st === "due" ? "due" : st === "reviewed" ? "reviewed" : "") + (d.id === selectedId ? " sel" : "");
          const conf = typeof d.confidence === "number" ? (Math.round(d.confidence * 100) + "% sure") : "";
          const pill = st === "due" ? '<span class="pill due">due for review</span>'
            : st === "reviewed" ? '<span class="pill reviewed">reviewed</span>' : "";
          el.innerHTML =
            '<div class="t">' + esc(d.title || d.id) + "</div>" +
            '<div class="s"><span>' + esc(fmtDate(d.decidedAt)) + "</span>" +
            (conf ? '<span class="conf">' + esc(conf) + "</span>" : "") + pill + "</div>";
          el.onclick = () => { selectedId = d.id; renderList(); renderDetail(d); };
          listEl.appendChild(el);
        }
      }

      function renderDetail(d) {
        const conf = typeof d.confidence === "number" ? Math.round(d.confidence * 100) + "%" : "—";
        const age = daysAgo(d.decidedAt);
        let html = "<h2>" + esc(d.title || d.id) + "</h2>";
        html += '<p class="q">' + esc(d.question || "") + "</p>";
        html += '<div class="meta">'
          + "<span>decided <b>" + esc(fmtDate(d.decidedAt)) + "</b>" + (age != null ? " · " + age + "d ago" : "") + "</span>"
          + "<span>confidence then <b>" + esc(conf) + "</b></span>"
          + "<span>chose <b>" + asVal(d.chosen) + "</b></span>"
          + (d.basis ? '<span>basis <b title="the decisionId pinned by `decide`">' + esc(d.basis) + "</b></span>" : "")
          + "</div>";

        // ── THEN vs NOW ──────────────────────────────────────────────────────────
        html += '<div class="cols">';
        // THEN — the replayed basis
        html += '<div class="col then"><h3>What I knew THEN</h3><p class="sub">the basis this decision was pinned to, re-resolved via <code>replay</code></p>';
        if (d.then && d.then.values) {
          for (const [k, v] of Object.entries(d.then.values)) {
            html += '<div class="kv"><div class="k">' + esc(k) + '</div><div class="v">' + asVal(v) + "</div></div>";
          }
          const since = (d.then.retractedSince || []);
          if (since.length) {
            html += '<div class="sincebox"><b>Retracted since:</b><br>' + since.map((s) => '<span class="retracted">' + esc(s) + "</span>").join("<br>") + "</div>";
          } else {
            html += '<div class="sincebox" style="color:var(--muted)">Nothing this decision saw has been retracted since.</div>';
          }
          if (d.then.at) html += '<p class="replayhint" style="margin-top:10px">pinned instant: ' + esc(fmtDate(d.then.at)) + "</p>";
        } else {
          html += '<p class="replayhint">Not yet replayed. Ask Claude to <b>replay</b> this decision\'s basis, or:</p>'
            + '<button class="replaybtn" data-replay="' + esc(d.id) + '">↺ Replay the basis</button>';
        }
        html += "</div>";
        // NOW — the rationale + live read
        html += '<div class="col now"><h3>What I know NOW</h3><p class="sub">the live view + the reasoning recorded at decision time (frozen)</p>';
        html += '<div class="kv"><div class="k">rationale</div><div class="v">' + esc(d.rationale || "—") + "</div></div>";
        const opts = logEntries(d.options).map((o) => o.value !== undefined ? o.value : o);
        const optList = Array.isArray(d.options) ? d.options : [];
        html += '<div class="kv"><div class="k">options</div><div class="v">' + (optList.length ? optList.map(asVal).join(" · ") : "—") + "</div></div>";
        html += '<div class="kv"><div class="k">chosen</div><div class="v">' + asVal(d.chosen) + "</div></div>";
        const nOutcome = logEntries(d.outcome).length;
        html += '<div class="kv"><div class="k">learned since</div><div class="v">' + (nOutcome ? nOutcome + " outcome/review note(s) appended below" : "nothing appended yet") + "</div></div>";
        html += "</div></div>"; // /cols

        // ── Append-only log ──────────────────────────────────────────────────────
        html += '<div class="log"><h3>Hindsight log</h3><p class="ethic">Append-only. Outcomes and reviews are added as new observations — the original decision is never rewritten.</p>';
        const entries = []
          .concat(logEntries(d.reviewNote).map((e) => ({ ...e, type: "review" })))
          .concat(logEntries(d.outcome).map((e) => ({ ...e, type: "outcome" })))
          .sort((a, b) => (b.at || 0) - (a.at || 0));
        if (entries.length) {
          for (const e of entries) {
            html += '<div class="entry ' + e.type + '"><div class="lbl">' + (e.type === "outcome" ? "outcome" : "review note") + (e.at ? " · " + esc(fmtDate(e.at)) : "") + "</div>"
              + '<div class="val">' + esc(e.value) + "</div></div>";
          }
        } else {
          html += '<p class="none">No outcomes logged yet. Once you know how this turned out, append it below — honestly.</p>';
        }
        html += "</div>";

        // ── Forms: append an outcome / review (never a revise of the original) ────
        html += appendForm(d.id);

        detailEl.innerHTML = html;
        wireDetail(d);
      }

      function appendForm(aboutId) {
        return '<form class="append" id="appendf" data-about="' + esc(aboutId) + '">'
          + '<h3>Log an outcome or review</h3>'
          + '<p class="why">This <b>appends</b> a new observation. It does not touch the rationale, confidence, or choice you recorded when you decided — those stay frozen so the track record stays honest.</p>'
          + '<label>Kind</label><select name="kind"><option value="outcome">outcome — how it actually turned out</option><option value="review-note">review note — what I know now that I didn\'t then</option></select>'
          + '<label>What happened / what you learned</label><textarea name="value" rows="3" placeholder="Be honest with your future self."></textarea>'
          + '<button class="go" type="submit">Append (never overwrite)</button>'
          + '<div class="pending" id="pending"></div></form>';
      }

      // The "record a decision" form → emits a `decide` intent (pin the basis), then the field writes.
      function recordForm() {
        let opt = "";
        for (let i = 1; i <= 4; i++) opt += '<label>Option ' + i + (i <= 2 ? "" : " (optional)") + '</label><input name="opt' + i + '" placeholder="a choice you considered" />';
        detailEl.innerHTML =
          '<h2>Record a decision</h2>'
          + '<p class="q">Pins <b>what you know right now</b> as the basis (Chorus <code>decide</code>). You can append outcomes later — but you can never rewrite this moment.</p>'
          + '<form id="recordf">'
          + '<label>Title</label><input name="title" placeholder="e.g. Switch the store backend to SQLite" required />'
          + '<label>Question being decided</label><input name="question" placeholder="What exactly are you choosing between?" required />'
          + opt
          + '<label>Chosen option</label><input name="chosen" placeholder="which one did you pick?" required />'
          + '<label>Rationale (why — as of now)</label><textarea name="rationale" rows="3"></textarea>'
          + '<label>Confidence <span class="conf-out" id="confout">70%</span></label>'
          + '<div class="conf-row"><input type="range" name="confidence" min="0" max="100" value="70" oninput="document.getElementById(\'confout\').textContent=this.value+\'%\'" /></div>'
          + '<button class="go" type="submit">Decide &amp; pin the basis</button>'
          + '<div class="pending" id="pending"></div></form>';
        wireRecord();
      }

      function slugify(s) {
        return CONFIG.typePrefix + String(s).toLowerCase().trim().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "").slice(0, 60);
      }

      function wireDetail(d) {
        const rb = detailEl.querySelector("[data-replay]");
        if (rb) rb.onclick = () => {
          rb.textContent = "↺ replaying…";
          // Ask Claude (or a standalone runtime) to replay the pinned basis.
          window.dispatchEvent(new CustomEvent("chorus:replay", { detail: { decisionId: d.basis, about: d.id } }));
          rb.insertAdjacentHTML("afterend", '<p class="replayhint wait" style="margin-top:8px">Requested a replay of the basis. Claude re-resolves the pinned instant and fills the THEN column.</p>');
        };
        const form = document.getElementById("appendf");
        if (!form) return;
        form.onsubmit = (e) => {
          e.preventDefault();
          const data = Object.fromEntries(new FormData(form).entries());
          if (!data.value || !data.value.trim()) return;
          const about = form.dataset.about;
          // APPEND: a fresh remember() as an observation. Explicitly NOT a revise of the original.
          const write = { tool: "remember", args: { about, attribute: data.kind, value: data.value.trim(), kind: "observation" } };
          emitWrite("append", [write]);
        };
      }

      function wireRecord() {
        const form = document.getElementById("recordf");
        form.onsubmit = (e) => {
          e.preventDefault();
          const data = Object.fromEntries(new FormData(form).entries());
          const id = slugify(data.title);
          const confidence = Math.round((Number(data.confidence) || 70)) / 100;
          const now = Date.now();
          const options = [data.opt1, data.opt2, data.opt3, data.opt4].filter((o) => o && o.trim());
          // 1) `decide` pins the basis (what is known NOW) and returns a decisionId → stored as `basis`.
          const intents = [{ tool: "decide", args: { about: id, intent: data.question || data.title } }];
          // 2) the field writes — frozen facts of this instant.
          const remembers = [
            { attribute: "title", value: data.title, kind: "fact" },
            { attribute: "question", value: data.question, kind: "fact" },
            { attribute: "chosen", value: data.chosen, kind: "fact" },
            { attribute: "rationale", value: data.rationale, kind: "fact" },
            { attribute: "confidence", value: confidence, kind: "fact" },
            { attribute: "decided-at", value: now, kind: "fact" },
          ].filter((r) => r.value !== undefined && r.value !== "").map((r) => ({ tool: "remember", args: { about: id, ...r } }));
          // options are set-valued → one remember per option (Claude declares attr:options plurality once).
          for (const o of options) remembers.push({ tool: "remember", args: { about: id, attribute: "options", value: o.trim(), kind: "fact" } });
          // basis is filled by Claude from the decide result; we note the intent so it isn't forgotten.
          remembers.push({ tool: "remember", args: { about: id, attribute: "basis", value: "<decisionId from decide>", kind: "fact" } });
          emitWrite("decide", intents.concat(remembers));
        };
      }

      // In Claude mode: emit an intent; Claude performs the calls (decide/remember/replay), then re-renders.
      // In standalone mode: POST them directly. Always show the exact calls for transparency.
      function emitWrite(intent, calls) {
        const pending = document.getElementById("pending");
        if (pending) pending.innerHTML = "<pre>" + esc(JSON.stringify({ intent, calls }, null, 2)) + "</pre>";
        window.CHORUS_PENDING = (window.CHORUS_PENDING || []).concat(calls);
        window.dispatchEvent(new CustomEvent("chorus:write", { detail: { intent, calls } }));
        if (mode === "standalone") {
          (async () => {
            for (const c of calls) { try { await mcpCall(c.tool, c.args); } catch (err) { /* surfaced below */ } }
            if (pending) pending.innerHTML += '<div class="ok">sent to ' + esc(endpoint.url) + " — reload to see the updated journal.</div>";
          })();
        } else if (pending) {
          pending.innerHTML += '<div class="wait">Ask Claude to run these (or say "save"). ' + (intent === "decide" ? "It will pin the basis with <code>decide</code> and store the returned id as <code>basis</code>." : intent === "append" ? "It appends an observation — it will <b>not</b> revise the original." : "") + "</div>";
        }
      }

      // Minimal MCP JSON-RPC for standalone mode.
      async function mcpCall(tool, args) {
        const res = await fetch(endpoint.url, {
          method: "POST",
          headers: { "Content-Type": "application/json", "Mcp-Session-Id": endpoint.session || "", Authorization: "Bearer " + (endpoint.token || "") },
          body: JSON.stringify({ jsonrpc: "2.0", id: Date.now(), method: "tools/call", params: { name: tool, arguments: args } }),
        });
        return res.json();
      }

      document.getElementById("newbtn").onclick = () => { selectedId = null; renderList(); recordForm(); };

      renderList();
      const first = decisions.slice().sort((a, b) => (b.decidedAt || 0) - (a.decidedAt || 0))[0];
      if (first) { selectedId = first.id; renderList(); renderDetail(first); }
    </script>
  </body>
</html>
