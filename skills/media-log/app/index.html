<!doctype html>
<!--
  Media Log — a Chorus app-skill. Self-contained, dual-mode, single-file UI. No build step.

  MODES (see the designer skill's two-mode contract):
    • Claude-mediated (primary): Claude injects a snapshot as window.CHORUS_DATA and performs writes
      when the app emits a `chorus:write` intent. No credentials in the page.
    • Standalone: set window.CHORUS_ENDPOINT = {url, token, session} to speak MCP JSON-RPC directly.
    • Neither present → seeded sample data + a visible "connect" notice. Never blank-screen.

  DATA SHAPE (window.CHORUS_DATA): an array of works. Each work:
    {
      id: "film:dune-part-two",
      title: "Dune: Part Two", year: "2024", type: "film",           // primitives
      director: {entity: "person:denis-villeneuve", label?: "…"},    // reference
      writtenBy: {entity: "person:…"},                                // reference
      cast:   [{entity:"person:…", label?:"…"}, …],                   // SET of references (all:true)
      themes: [{entity:"concept:…", label?:"…"}, …],                  // SET of references
      watchedWith: [{entity:"person:…"}, …],                          // SET of references
      rating: 9,                                                      // observation (may be an array
                                                                      //   of {value,who,session} to
                                                                      //   surface disagreement)
      status: "watched",                                             // want | watching | watched
      backlinks?: { "person:…": [{source, attribute}], … }           // reverse edges, optional
    }
  A `label` on a reference is display-only sugar; the entity id is the truth.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Media Log</title>
    <style>
      :root {
        --bg: #0e1014; --panel: #161922; --panel2: #1c2029; --ink: #e9ebf0; --muted: #9aa0ad;
        --accent: #f0a35e; --accent2: #7aa2f7; --line: #262b36; --good: #7ee787; --warn: #f7b955;
        --star: #f2c14e; --want: #7aa2f7; --watching: #f7b955; --watched: #7ee787;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--ink); }
      header { padding: 14px 20px; border-bottom: 1px solid var(--line); display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
      header h1 { font-size: 18px; margin: 0; letter-spacing: 0.2px; }
      header h1 .dot { color: var(--accent); }
      header .mode { font-size: 12px; color: var(--muted); margin-left: auto; }
      .filters { display: flex; gap: 6px; padding: 10px 20px; border-bottom: 1px solid var(--line); background: var(--panel); flex-wrap: wrap; }
      .filters button { background: transparent; color: var(--muted); border: 1px solid var(--line); border-radius: 999px; padding: 4px 12px; font: inherit; font-size: 13px; cursor: pointer; }
      .filters button.on { background: var(--accent); color: #171008; border-color: var(--accent); font-weight: 600; }
      .notice { padding: 10px 20px; background: #1d1a10; color: var(--warn); font-size: 13px; border-bottom: 1px solid var(--line); }

      .upnext { padding: 12px 20px; border-bottom: 1px solid var(--line); background: linear-gradient(180deg, var(--panel), transparent); }
      .upnext h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 0 0 8px; }
      .upnext .cards { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; }
      .upnext .card { min-width: 190px; background: var(--panel2); border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; cursor: pointer; }
      .upnext .card:hover { border-color: var(--accent); }
      .upnext .card .t { font-weight: 600; }
      .upnext .card .why { font-size: 12px; color: var(--muted); margin-top: 4px; }
      .upnext .empty { color: var(--muted); font-size: 13px; }

      .wrap { display: grid; grid-template-columns: 340px 1fr; gap: 0; min-height: 300px; }
      @media (max-width: 760px) { .wrap { grid-template-columns: 1fr; } }
      .list { border-right: 1px solid var(--line); overflow-y: auto; max-height: calc(100vh - 60px); }
      .item { padding: 12px 20px; border-bottom: 1px solid var(--line); cursor: pointer; display: flex; gap: 10px; align-items: baseline; }
      .item:hover, .item.sel { background: var(--panel); }
      .item .t { font-weight: 600; }
      .item .s { color: var(--muted); font-size: 13px; margin-top: 2px; }
      .item .rt { margin-left: auto; color: var(--star); font-size: 13px; white-space: nowrap; }

      .pill { font-size: 11px; padding: 1px 8px; border-radius: 999px; border: 1px solid var(--line); color: var(--muted); text-transform: capitalize; }
      .pill.want { color: var(--want); border-color: color-mix(in srgb, var(--want) 45%, transparent); }
      .pill.watching { color: var(--watching); border-color: color-mix(in srgb, var(--watching) 45%, transparent); }
      .pill.watched { color: var(--watched); border-color: color-mix(in srgb, var(--watched) 45%, transparent); }
      .kindtag { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); border: 1px solid var(--line); border-radius: 5px; padding: 0 4px; margin-left: 6px; }

      .detail { padding: 20px; overflow-y: auto; max-height: calc(100vh - 60px); }
      .detail h2 { margin: 0 0 2px; }
      .detail .sub { color: var(--muted); margin-bottom: 14px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      .row { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px dashed var(--line); align-items: flex-start; }
      .row .k { color: var(--muted); min-width: 120px; font-size: 13px; padding-top: 2px; }
      .row .v { flex: 1; }
      .ref { display: inline-block; color: var(--accent2); text-decoration: none; background: var(--panel2); border: 1px solid var(--line); border-radius: 6px; padding: 2px 8px; margin: 2px 4px 2px 0; font-size: 13px; cursor: pointer; }
      .ref:hover { border-color: var(--accent2); }
      .contest { color: var(--warn); font-size: 12px; margin-left: 6px; }
      .prov { color: var(--muted); font-size: 12px; }

      .rate { display: flex; gap: 4px; align-items: center; margin: 4px 0; }
      .rate .star { cursor: pointer; font-size: 18px; color: var(--line); user-select: none; }
      .rate .star.on { color: var(--star); }
      .rate .num { color: var(--muted); font-size: 13px; margin-left: 6px; }
      .statusctl { display: flex; gap: 6px; margin: 4px 0; }
      .statusctl button { background: transparent; color: var(--muted); border: 1px solid var(--line); border-radius: 7px; padding: 4px 10px; font: inherit; font-size: 13px; cursor: pointer; text-transform: capitalize; }
      .statusctl button.on { border-color: var(--accent); color: var(--ink); }

      .backlinks { margin-top: 8px; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; }
      .backlinks h4 { margin: 0 0 6px; font-size: 13px; }
      .backlinks .bl { padding: 4px 0; border-bottom: 1px dashed var(--line); font-size: 13px; }
      .backlinks .bl a { color: var(--accent2); cursor: pointer; text-decoration: none; }
      .backlinks .close { float: right; color: var(--muted); cursor: pointer; }

      form.log { margin-top: 22px; padding: 16px; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; }
      form.log h3 { margin: 0 0 4px; font-size: 15px; }
      form.log p.hint { margin: 0 0 12px; font-size: 12px; color: var(--muted); }
      form.log label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 3px; }
      form.log input, form.log select, form.log textarea { width: 100%; background: var(--bg); color: var(--ink); border: 1px solid var(--line); border-radius: 7px; padding: 8px 10px; font: inherit; }
      form.log .two { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      form.log button { margin-top: 14px; background: var(--accent); color: #171008; border: 0; border-radius: 8px; padding: 9px 16px; font-weight: 700; cursor: pointer; }
      .pending { margin-top: 14px; font-size: 13px; }
      .pending pre { background: var(--bg); border: 1px solid var(--line); border-radius: 8px; padding: 10px; overflow-x: auto; white-space: pre-wrap; }
      .empty { color: var(--muted); }
    </style>
  </head>
  <body>
    <!-- ── CONFIG: media-log domain ─────────────────────────────────────────────── -->
    <script>
      const CONFIG = {
        title: "Media Log",
        // Entity prefixes for the primary work types this app renders.
        typePrefixes: ["film:", "work:", "book:", "episode:"],
        // Reference-valued attributes (never plain strings — traversal depends on it).
        refAttrs: { director: "single", writtenBy: "single", cast: "set", themes: "set", watchedWith: "set" },
        // Attribute → the entity prefix its default value should use (for the log form).
        newIdPrefix: "film:",
        // Sample data — shown when no live Chorus is connected. Never blank-screen.
        sample: [
          {
            id: "film:dune-part-two", title: "Dune: Part Two", year: "2024", type: "film",
            director: { entity: "person:denis-villeneuve", label: "Denis Villeneuve" },
            writtenBy: { entity: "person:frank-herbert", label: "Frank Herbert (novel)" },
            cast: [
              { entity: "person:timothee-chalamet", label: "Timothée Chalamet" },
              { entity: "person:zendaya", label: "Zendaya" },
              { entity: "person:rebecca-ferguson", label: "Rebecca Ferguson" },
            ],
            themes: [
              { entity: "concept:prophecy", label: "prophecy" },
              { entity: "concept:power", label: "power" },
              { entity: "concept:destiny", label: "destiny" },
            ],
            rating: [
              { value: 9, who: "user", session: "sess-2026-06-30" },
              { value: 8, who: "myk-bailey", session: "sess-2026-05-02" },
            ],
            status: "watched",
            watchedWith: [{ entity: "person:myk-bailey", label: "Myk Bailey" }],
          },
          {
            id: "film:dune-part-one", title: "Dune", year: "2021", type: "film",
            director: { entity: "person:denis-villeneuve", label: "Denis Villeneuve" },
            writtenBy: { entity: "person:frank-herbert", label: "Frank Herbert (novel)" },
            cast: [
              { entity: "person:timothee-chalamet", label: "Timothée Chalamet" },
              { entity: "person:rebecca-ferguson", label: "Rebecca Ferguson" },
            ],
            themes: [
              { entity: "concept:prophecy", label: "prophecy" },
              { entity: "concept:destiny", label: "destiny" },
            ],
            rating: 8, status: "watched",
          },
          {
            id: "book:dune", title: "Dune (novel)", year: "1965", type: "book",
            writtenBy: { entity: "person:frank-herbert", label: "Frank Herbert" },
            themes: [
              { entity: "concept:prophecy", label: "prophecy" },
              { entity: "concept:ecology", label: "ecology" },
              { entity: "concept:power", label: "power" },
            ],
            status: "want",
          },
          {
            id: "book:dune-messiah", title: "Dune Messiah (novel)", year: "1969", type: "book",
            writtenBy: { entity: "person:frank-herbert", label: "Frank Herbert" },
            themes: [
              { entity: "concept:prophecy", label: "prophecy" },
              { entity: "concept:destiny", label: "destiny" },
            ],
            status: "want",
          },
          {
            id: "episode:buffy-s6e07-once-more-with-feeling",
            title: "Buffy S6E07 — Once More, With Feeling", year: "2001", type: "tv",
            director: { entity: "person:joss-whedon", label: "Joss Whedon" },
            themes: [
              { entity: "concept:grief", label: "grief" },
              { entity: "concept:secrets", label: "secrets" },
            ],
            rating: 10, status: "watched",
          },
        ],
      };
    </script>
    <!-- ── END CONFIG ───────────────────────────────────────────────────────────── -->

    <header>
      <h1><span class="dot">●</span> <span id="title">Media Log</span></h1>
      <span class="mode" id="mode">mode: —</span>
    </header>
    <div id="notice" class="notice" style="display: none"></div>

    <div class="filters" id="filters"></div>
    <div class="upnext" id="upnext"></div>

    <div class="wrap">
      <div class="list" id="list"></div>
      <div class="detail" id="detail"><p class="empty">Select something from your library.</p></div>
    </div>

    <script>
      // ── Data source: Claude-injected snapshot, standalone endpoint, or sample. ──
      const endpoint = window.CHORUS_ENDPOINT || null;
      let items = Array.isArray(window.CHORUS_DATA) ? window.CHORUS_DATA : null;
      let mode = items ? "claude" : endpoint ? "standalone" : "sample";
      if (!items) items = CONFIG.sample.slice();

      let filter = "all";      // all | want | watching | watched
      let selectedId = items[0] && items[0].id;

      document.getElementById("title").textContent = CONFIG.title;
      document.getElementById("mode").textContent = "mode: " + mode;
      if (mode === "sample") {
        const n = document.getElementById("notice");
        n.style.display = "block";
        n.textContent =
          "Showing sample data — not connected to Chorus. Ask Claude to load your library, or set window.CHORUS_ENDPOINT to deploy standalone.";
      }

      const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
      const byId = (id) => items.find((x) => x.id === id);
      const listEl = document.getElementById("list");
      const detailEl = document.getElementById("detail");

      // A reference may be {entity,label} or a bare id string. Normalize + label it.
      const refId = (r) => (r && typeof r === "object" ? r.entity : r);
      const refLabel = (r) => (r && typeof r === "object" && r.label) ? r.label : prettyId(refId(r));
      function prettyId(id) {
        if (!id) return "";
        const slug = String(id).split(":").slice(1).join(":");
        return slug.replace(/-/g, " ").replace(/\b\w/g, (c) => c.toUpperCase());
      }
      const asArray = (v) => (v == null ? [] : Array.isArray(v) ? v : [v]);

      // rating may be a scalar OR an array of {value,who,session} (disagreement surfaced).
      function ratingViews(work) {
        if (work.rating == null) return [];
        return asArray(work.rating).map((r) => (typeof r === "object" ? r : { value: r, who: "user" }));
      }
      function myRating(work) {
        const vs = ratingViews(work);
        const mine = vs.find((v) => v.who === "user");
        return mine ? Number(mine.value) : (vs[0] ? Number(vs[0].value) : 0);
      }
      const stars = (n) => "★".repeat(Math.round(n / 2)) + "☆".repeat(5 - Math.round(n / 2));

      // ── Filters ──────────────────────────────────────────────────────────────
      function renderFilters() {
        const opts = ["all", "want", "watching", "watched"];
        document.getElementById("filters").innerHTML = opts
          .map((o) => `<button data-f="${o}" class="${o === filter ? "on" : ""}">${o === "all" ? "All" : o[0].toUpperCase() + o.slice(1)}</button>`)
          .join("");
        document.querySelectorAll("#filters button").forEach((b) => (b.onclick = () => { filter = b.dataset.f; render(); }));
      }

      // ── "Up next": status:want, ranked by themes the user rates highly. ────────
      function themeScores() {
        const score = {}; // concept id → summed (rating-5) across works
        for (const w of items) {
          const r = myRating(w);
          if (!r) continue;
          for (const t of asArray(w.themes)) {
            const id = refId(t);
            score[id] = (score[id] || 0) + (r - 5);
          }
        }
        return score;
      }
      function upNext() {
        const scores = themeScores();
        return items
          .filter((w) => w.status === "want")
          .map((w) => {
            const themes = asArray(w.themes);
            const s = themes.reduce((a, t) => a + (scores[refId(t)] || 0), 0);
            const top = themes
              .filter((t) => (scores[refId(t)] || 0) > 0)
              .sort((a, b) => (scores[refId(b)] || 0) - (scores[refId(a)] || 0))
              .slice(0, 2)
              .map((t) => refLabel(t));
            return { w, s, why: top.length ? "themes you rate highly: " + top.join(", ") : "on your list" };
          })
          .sort((a, b) => b.s - a.s);
      }
      function renderUpNext() {
        const el = document.getElementById("upnext");
        const picks = upNext();
        let html = "<h2>Up next</h2>";
        if (!picks.length) {
          html += '<div class="empty">Nothing on the watchlist. Mark something <b>want</b>, or log a new title below.</div>';
        } else {
          html += '<div class="cards">' + picks.map(({ w, why }) =>
            `<div class="card" data-id="${esc(w.id)}"><div class="t">${esc(w.title || prettyId(w.id))}</div><div class="why">${esc(why)}</div></div>`
          ).join("") + "</div>";
        }
        el.innerHTML = html;
        el.querySelectorAll(".card").forEach((c) => (c.onclick = () => { selectedId = c.dataset.id; render(); }));
      }

      // ── Library list ───────────────────────────────────────────────────────────
      function visible() {
        return items.filter((w) => filter === "all" || w.status === filter);
      }
      function renderList() {
        const vis = visible();
        listEl.innerHTML = vis.length ? "" : '<div class="item empty">Nothing here yet.</div>';
        for (const w of vis) {
          const d = document.createElement("div");
          d.className = "item" + (w.id === selectedId ? " sel" : "");
          const r = myRating(w);
          d.innerHTML =
            `<div><div class="t">${esc(w.title || prettyId(w.id))}</div>` +
            `<div class="s">${esc(w.year || "")} · <span class="pill ${esc(w.status || "")}">${esc(w.status || "—")}</span></div></div>` +
            (r ? `<div class="rt" title="your rating ${r}/10">${stars(r)}</div>` : "");
          d.onclick = () => { selectedId = w.id; render(); };
          listEl.appendChild(d);
        }
      }

      // ── Detail panel ─────────────────────────────────────────────────────────
      let openBacklinkTarget = null;

      function refRow(label, value) {
        const refs = asArray(value);
        if (!refs.length) return "";
        const contested = refs.length > 1 && (label === "Director" || label === "Written by") ? '<span class="contest">· multiple values — left standing</span>' : "";
        const chips = refs.map((r) => `<a class="ref" data-ref="${esc(refId(r))}">${esc(refLabel(r))}</a>`).join("");
        return `<div class="row"><div class="k">${esc(label)}</div><div class="v">${chips}${contested}</div></div>`;
      }

      function renderDetail(work) {
        if (!work) { detailEl.innerHTML = '<p class="empty">Select something from your library.</p>'; return; }
        const rviews = ratingViews(work);
        const mine = myRating(work);

        let html = `<h2>${esc(work.title || prettyId(work.id))}</h2>`;
        html += `<div class="sub">${esc(work.year || "")} <span class="pill ${esc(work.status || "")}">${esc(work.status || "—")}</span> <span class="kindtag">${esc(work.type || work.id.split(":")[0])}</span> <span class="prov">${esc(work.id)}</span></div>`;

        // Rating control (kind:observation, signed speaker:user).
        html += `<div class="row"><div class="k">Your rating <span class="kindtag">obs</span></div><div class="v">`;
        html += `<div class="rate" id="rate">`;
        for (let i = 1; i <= 5; i++) {
          const on = i <= Math.round(mine / 2) ? "on" : "";
          html += `<span class="star ${on}" data-v="${i * 2}">★</span>`;
        }
        html += `<span class="num" id="ratenum">${mine ? mine + "/10" : "unrated"}</span></div>`;
        if (rviews.length > 1) {
          html += `<div class="prov">also: ${rviews.filter((v) => v.who !== "user").map((v) => `${esc(v.value)}/10 <span class="contest">(${esc(v.who)})</span>`).join(", ")} — disagreement left standing</div>`;
        }
        html += `</div></div>`;

        // Status control (kind:observation).
        html += `<div class="row"><div class="k">Status <span class="kindtag">obs</span></div><div class="v"><div class="statusctl" id="statusctl">`;
        for (const s of ["want", "watching", "watched"]) html += `<button data-s="${s}" class="${work.status === s ? "on" : ""}">${s}</button>`;
        html += `</div></div></div>`;

        // Reference rows — cast/crew/themes as clickable entity refs.
        html += refRow("Director", work.director);
        html += refRow("Written by", work.writtenBy);
        html += refRow("Cast", work.cast);
        html += refRow("Themes", work.themes);
        html += refRow("Watched with", work.watchedWith);

        // Inline backlinks panel (reverse traversal for a clicked ref).
        html += `<div id="blpanel"></div>`;

        // Log-a-watch / add-to-watchlist form.
        html += logForm(work);

        detailEl.innerHTML = html;
        wireDetail(work);
        if (openBacklinkTarget) renderBacklinks(openBacklinkTarget);
      }

      // Reverse traversal. In Claude/standalone mode we ask for live backlinks; in sample mode we
      // compute them from the in-memory set so clicking always shows "more with this person/theme."
      function computeBacklinks(target) {
        const out = [];
        for (const w of items) {
          for (const [attr, val] of Object.entries(w)) {
            for (const r of asArray(val)) {
              if (r && typeof r === "object" && r.entity === target) out.push({ source: w.id, attribute: attr, title: w.title });
            }
          }
          if (w.backlinks && w.backlinks[target]) for (const b of w.backlinks[target]) out.push(b);
        }
        return out;
      }
      function renderBacklinks(target) {
        openBacklinkTarget = target;
        const panel = document.getElementById("blpanel");
        if (!panel) return;
        const links = computeBacklinks(target);
        let html = `<div class="backlinks"><span class="close" id="blclose">✕</span><h4>More with <b>${esc(prettyId(target))}</b> <span class="prov">(${esc(target)})</span></h4>`;
        html += `<div class="prov">gql: backlinks(target: "${esc(target)}")</div>`;
        if (!links.length) html += '<div class="empty">No other titles point at this yet.</div>';
        else html += links.map((b) => `<div class="bl"><a data-goto="${esc(b.source)}">${esc(b.title || prettyId(b.source))}</a> <span class="prov">— via ${esc(b.attribute)}</span></div>`).join("");
        html += `</div>`;
        panel.innerHTML = html;
        panel.querySelector("#blclose").onclick = () => { openBacklinkTarget = null; panel.innerHTML = ""; };
        panel.querySelectorAll("[data-goto]").forEach((a) => (a.onclick = () => {
          const t = a.dataset.goto;
          if (byId(t)) { selectedId = t; openBacklinkTarget = null; render(); }
        }));
      }

      function wireDetail(work) {
        // Clickable references → backlinks (reverse traversal).
        detailEl.querySelectorAll(".ref").forEach((a) => (a.onclick = () => renderBacklinks(a.dataset.ref)));
        // Rating stars → revise (rating changes). Signed speaker:user, kind:observation.
        detailEl.querySelectorAll("#rate .star").forEach((st) => (st.onclick = () => {
          const v = Number(st.dataset.v);
          emitWrites([{ tool: "remember", args: { about: work.id, attribute: "rating", value: v, kind: "observation", speaker: "user" }, note: "rating change → Claude should revise the prior rating delta, not just add" }]);
          applyLocal(work.id, "rating", [{ value: v, who: "user" }].concat(ratingViews(work).filter((r) => r.who !== "user")));
        }));
        // Status buttons → observation (transition).
        detailEl.querySelectorAll("#statusctl button").forEach((b) => (b.onclick = () => {
          const s = b.dataset.s;
          emitWrites([{ tool: "remember", args: { about: work.id, attribute: "status", value: s, kind: "observation", speaker: "user" }, note: "status transition → revise the prior status delta" }]);
          applyLocal(work.id, "status", s);
        }));
        // Log form.
        wireLogForm(work);
      }

      // ── Log-a-watch / add-to-watchlist form. Emits chorus:write intents. ───────
      function logForm(work) {
        return `
        <form class="log" id="logf">
          <h3>Log a watch / add to watchlist</h3>
          <p class="hint">Cast, director, themes, and companions are saved as <b>entity references</b> (person: / concept:), not text — so traversal keeps working. Comma-separate people or themes.</p>
          <label>Title's entity id</label>
          <input name="about" value="${esc(work ? work.id : CONFIG.newIdPrefix)}" />
          <div class="two">
            <div><label>Title</label><input name="title" value="${esc(work ? (work.title || "") : "")}" /></div>
            <div><label>Year</label><input name="year" value="${esc(work ? (work.year || "") : "")}" /></div>
          </div>
          <div class="two">
            <div><label>Status</label>
              <select name="status">
                ${["", "want", "watching", "watched"].map((s) => `<option ${work && work.status === s ? "selected" : ""} value="${s}">${s || "— unchanged —"}</option>`).join("")}
              </select>
            </div>
            <div><label>Your rating (1–10)</label><input name="rating" type="number" min="1" max="10" /></div>
          </div>
          <label>Director (person: id)</label>
          <input name="director" placeholder="person:denis-villeneuve" value="${esc(work && work.director ? refId(work.director) : "")}" />
          <label>Cast (person: ids, comma-separated)</label>
          <input name="cast" placeholder="person:zendaya, person:timothee-chalamet" />
          <label>Themes (concept: ids, comma-separated)</label>
          <input name="themes" placeholder="concept:prophecy, concept:power" />
          <label>Watched with (person: ids, comma-separated) — logs a watch event</label>
          <input name="watchedWith" placeholder="person:myk-bailey" />
          <label>Watch/read date (for the event)</label>
          <input name="date" type="date" />
          <button type="submit">Save to Chorus</button>
          <div class="pending" id="pending"></div>
        </form>`;
      }

      function splitRefs(s) {
        return String(s || "").split(",").map((x) => x.trim()).filter(Boolean);
      }

      function wireLogForm(work) {
        const form = document.getElementById("logf");
        if (!form) return;
        form.onsubmit = (e) => {
          e.preventDefault();
          const d = Object.fromEntries(new FormData(form).entries());
          const about = d.about.trim();
          if (!about || about.indexOf(":") < 0) return;
          const writes = [];

          // Primitives (facts about the work).
          if (d.title) writes.push({ tool: "remember", args: { about, attribute: "title", value: d.title, kind: "fact" } });
          if (d.year) writes.push({ tool: "remember", args: { about, attribute: "year", value: d.year, kind: "fact" } });

          // Single references — director (fact).
          if (d.director) writes.push({ tool: "remember", args: { about, attribute: "director", value: { entity: d.director }, kind: "fact" } });

          // Set-valued reference attributes — declare plurality once, then union each member.
          const sets = { cast: splitRefs(d.cast), themes: splitRefs(d.themes) };
          for (const [attr, refs] of Object.entries(sets)) {
            if (!refs.length) continue;
            writes.push({ tool: "remember", args: { about: "attr:" + attr, attribute: "plurality", value: "set", kind: "fact" }, note: "declare set once (idempotent)" });
            for (const r of refs) writes.push({ tool: "remember", args: { about, attribute: attr, value: { entity: r }, kind: "fact" } });
          }

          // Observations about the user's relationship to the work.
          if (d.status) writes.push({ tool: "remember", args: { about, attribute: "status", value: d.status, kind: "observation", speaker: "user" }, note: "if status existed, revise instead of adding" });
          if (d.rating) writes.push({ tool: "remember", args: { about, attribute: "rating", value: Number(d.rating), kind: "observation", speaker: "user" }, note: "if rating existed, revise instead of adding" });

          // watched-with + an event: entity linking the user to the work on a date.
          const withRefs = splitRefs(d.watchedWith);
          if (withRefs.length) {
            writes.push({ tool: "remember", args: { about: "attr:watched-with", attribute: "plurality", value: "set", kind: "fact" }, note: "declare set once" });
            for (const r of withRefs) writes.push({ tool: "remember", args: { about, attribute: "watched-with", value: { entity: r }, kind: "observation", speaker: "user" } });
          }
          if (d.date) {
            const slug = about.split(":").slice(1).join("-");
            const evt = "event:user-" + (d.status === "watched" ? "watch" : "log") + "-" + slug + "-" + d.date;
            writes.push({ tool: "remember", args: { about: evt, attribute: "actor", value: { entity: "person:user" }, kind: "observation" } });
            writes.push({ tool: "remember", args: { about: evt, attribute: "work", value: { entity: about }, kind: "observation" } });
            writes.push({ tool: "remember", args: { about: evt, attribute: "action", value: d.status === "watched" ? "watched" : "logged", kind: "observation" } });
            writes.push({ tool: "remember", args: { about: evt, attribute: "date", value: d.date, kind: "observation" } });
          }

          emitWrites(writes);

          // Optimistic local apply so the UI reflects the change immediately.
          let w = byId(about);
          if (!w) { w = { id: about, type: about.split(":")[0] }; items.push(w); }
          if (d.title) w.title = d.title;
          if (d.year) w.year = d.year;
          if (d.status) w.status = d.status;
          if (d.rating) applyLocal(about, "rating", [{ value: Number(d.rating), who: "user" }]);
          if (d.director) w.director = { entity: d.director };
          if (sets.cast.length) w.cast = (asArray(w.cast)).concat(sets.cast.map((r) => ({ entity: r })));
          if (sets.themes.length) w.themes = (asArray(w.themes)).concat(sets.themes.map((r) => ({ entity: r })));
          if (withRefs.length) w.watchedWith = (asArray(w.watchedWith)).concat(withRefs.map((r) => ({ entity: r })));
          selectedId = about;
          render();
        };
      }

      function applyLocal(id, attr, value) {
        const w = byId(id);
        if (w) w[attr] = value;
      }

      // Emit a chorus:write intent (Claude mode) or POST directly (standalone). Always show the calls.
      async function emitWrites(writes) {
        window.CHORUS_PENDING = (window.CHORUS_PENDING || []).concat(writes);
        window.dispatchEvent(new CustomEvent("chorus:write", { detail: writes }));
        const pending = document.getElementById("pending");
        if (pending) {
          pending.innerHTML = "<pre>" + esc(JSON.stringify(writes.map((w) => ({ tool: w.tool, args: w.args })), null, 2)) + "</pre>";
          if (mode === "standalone") {
            for (const w of writes) { try { await mcpCall(w.tool, w.args); } catch (e) {} }
            pending.innerHTML += '<div style="color:var(--good)">saved to ' + esc(endpoint.url) + "</div>";
          } else {
            pending.innerHTML += '<div style="color:var(--warn)">Ask Claude to save these (or say "save"). Ratings/status that already exist should be applied with <b>revise</b>, not a second add.</div>';
          }
        }
      }

      // Minimal MCP JSON-RPC for standalone mode.
      async function mcpCall(tool, args) {
        const res = await fetch(endpoint.url, {
          method: "POST",
          headers: { "Content-Type": "application/json", "Mcp-Session-Id": endpoint.session || "", Authorization: "Bearer " + (endpoint.token || "") },
          body: JSON.stringify({ jsonrpc: "2.0", id: Date.now(), method: "tools/call", params: { name: tool, arguments: args } }),
        });
        return res.json();
      }

      // ── Top-level render ───────────────────────────────────────────────────────
      function render() {
        renderFilters();
        renderUpNext();
        renderList();
        renderDetail(byId(selectedId) || visible()[0] || items[0]);
      }
      render();
    </script>
  </body>
</html>
