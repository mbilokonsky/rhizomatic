# The parity contract, enforced mechanically: both witnesses must pass their full green-gates,
# and the committed vectors must be exactly what the generator produces (no stale vectors).
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typescript:
    name: TypeScript witness
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementations/ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: implementations/ts/package-lock.json
      - run: npm ci
      - name: green-gate (format + lint + typecheck + tests)
        run: npm run check
      - name: playground bundles
        run: npm run playground:build
      - name: docs are fresh (tour + playground bundles == committed bytes)
        run: |
          npm run docs:build
          git diff --exit-code ../../docs
      - name: vectors are fresh (generator output == committed bytes)
        run: |
          npm run gen-vectors
          git diff --exit-code ../../vectors

  chorus:
    name: Chorus (app layer)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/chorus
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/chorus/package-lock.json
      # Chorus typechecks THROUGH @rhizomatic/core's TypeScript sources (the file: dep resolves
      # to implementations/ts/src), so the core's own deps (@noble/*) must be installed too —
      # otherwise tsc can't resolve them. This mirrors a local checkout where both are installed.
      - name: install core deps (chorus typechecks through the core's TS sources)
        working-directory: implementations/ts
        run: npm ci
      - run: npm ci
      - name: green-gate (format + lint + typecheck + tests)
        run: npm run check

  rust:
    name: Rust witness
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementations/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: implementations/rust
      - name: green-gate (fmt + clippy + tests)
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test
      - name: WASM witness builds (the tour's second witness, docs/rust-witness.wasm)
        run: |
          rustup target add wasm32-unknown-unknown
          cargo clippy --release --target wasm32-unknown-unknown -- -D warnings
          cargo build --release --target wasm32-unknown-unknown
