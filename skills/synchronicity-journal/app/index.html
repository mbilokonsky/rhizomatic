<!doctype html>
<!--
  Synchronicity Journal — a Chorus app-skill. Self-contained, dual-mode, single file. No build step.

  A reflective log for meaningful coincidences. This is NOT a catalog or an analytical tool.
  Reception by default: entries are received, not adjudicated. There is no confidence score, no
  "is this real?" affordance. `register` is the KIND of meaning, never a probability of surviving
  a skeptic. Superposition-friendly: contested attributes show BOTH values, never a winner.

  MODES:
    • Claude-mediated: Claude injects window.CHORUS_DATA (array of synchronicities) and, optionally,
      window.CHORUS_CONCEPTS (backlink map). Writes flow out as `chorus:write` intents; Claude
      performs the remember() calls and re-renders.
    • Standalone: set window.CHORUS_ENDPOINT = {url, token, session} to speak MCP JSON-RPC directly.
    • Neither present → seeded sample entries + a quiet "not connected" line. Never blank-screen.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Synchronicity Journal</title>
    <style>
      :root {
        /* warm, quiet, low-contrast — a lamplit page, not a dashboard */
        --bg: #1a1614;
        --page: #221d19;
        --panel: #2b2420;
        --ink: #ece3d7;
        --muted: #a99a86;
        --faint: #7d7062;
        --accent: #c9a36a;       /* warm gold — links, the thread between things */
        --accent-soft: #3a2f22;
        --line: #362d26;
        --thread: #8a6f4a;
        --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif;
        --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        /* register tints — the KIND of meaning, four textures, none "better" */
        --r-structural: #b98a52;
        --r-live: #8fae7a;
        --r-referential: #7f9bc0;
        --r-decorative: #b98ab0;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; }
      body {
        background: var(--bg); color: var(--ink); font-family: var(--serif);
        line-height: 1.6; -webkit-font-smoothing: antialiased;
      }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; text-underline-offset: 2px; }
      button { font: inherit; cursor: pointer; }

      header {
        max-width: 940px; margin: 0 auto; padding: 34px 24px 18px;
        display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
      }
      header .mark { font-size: 22px; letter-spacing: .3px; }
      header .mark b { font-weight: 600; }
      header .tagline { color: var(--faint); font-family: var(--sans); font-size: 13px; font-style: italic; }
      header .mode { margin-left: auto; color: var(--faint); font-family: var(--sans); font-size: 11px; }

      .notice {
        max-width: 940px; margin: 0 auto 6px; padding: 9px 24px;
        color: var(--muted); font-family: var(--sans); font-size: 12.5px; font-style: italic;
      }

      main { max-width: 940px; margin: 0 auto; padding: 0 24px 80px; }

      /* the stream — a column of entries, generous whitespace */
      .stream { display: flex; flex-direction: column; }
      .entry {
        padding: 20px 0; border-top: 1px solid var(--line); cursor: pointer;
        transition: opacity .15s ease;
      }
      .entry:first-child { border-top: 0; }
      .entry:hover { opacity: .92; }
      .entry .when { font-family: var(--sans); font-size: 11.5px; color: var(--faint); letter-spacing: .4px; text-transform: uppercase; }
      .entry .what { font-size: 18px; margin: 5px 0 9px; color: var(--ink); }
      .entry .meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

      /* register shown as the KIND of meaning — a soft tag, not a bar or a number */
      .reg { font-family: var(--sans); font-size: 11px; letter-spacing: .5px; padding: 2px 9px 3px; border-radius: 999px;
             border: 1px solid currentColor; opacity: .95; white-space: nowrap; }
      .reg .lbl { text-transform: uppercase; }
      .reg .kind { opacity: .7; margin-left: 6px; font-style: italic; text-transform: none; letter-spacing: 0; }
      .reg.structural { color: var(--r-structural); }
      .reg.live-input { color: var(--r-live); }
      .reg.referential { color: var(--r-referential); }
      .reg.decorative { color: var(--r-decorative); }
      .reg.unregistered { color: var(--faint); }
      .reg.contested { border-style: dashed; }

      .rhymes-hint { font-family: var(--sans); font-size: 12px; color: var(--faint); }

      /* detail — an overlay page, reading-first */
      .veil { position: fixed; inset: 0; background: rgba(12,9,7,.72); backdrop-filter: blur(2px);
              display: none; z-index: 20; }
      .veil.open { display: block; }
      .sheet {
        position: fixed; top: 0; right: 0; bottom: 0; width: min(560px, 100%);
        background: var(--page); border-left: 1px solid var(--line); z-index: 21;
        overflow-y: auto; transform: translateX(100%); transition: transform .22s ease;
        box-shadow: -20px 0 60px rgba(0,0,0,.4);
      }
      .sheet.open { transform: translateX(0); }
      .sheet .inner { padding: 30px 30px 60px; }
      .sheet .close { position: absolute; top: 16px; right: 20px; background: none; border: 0; color: var(--muted); font-size: 22px; }
      .sheet .when { font-family: var(--sans); font-size: 11.5px; color: var(--faint); letter-spacing: .4px; text-transform: uppercase; }
      .sheet h2 { font-weight: 400; font-size: 25px; line-height: 1.35; margin: 8px 0 16px; }
      .sheet .section { margin: 22px 0; }
      .sheet .section > .h { font-family: var(--sans); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--faint); margin-bottom: 8px; }
      .sheet .prose { color: var(--ink); }
      .sheet .prose.tension { color: var(--muted); font-style: italic; }

      /* composed-of / resonance as clickable entity refs — chips joined by a faint thread */
      .refs { display: flex; flex-wrap: wrap; gap: 8px; }
      .ref {
        font-family: var(--sans); font-size: 13px; padding: 4px 11px; border-radius: 8px;
        background: var(--accent-soft); border: 1px solid var(--line); color: var(--accent);
      }
      .ref .kindmark { color: var(--faint); margin-right: 6px; font-size: 11px; }
      a.ref:hover { text-decoration: none; border-color: var(--thread); }
      .ref.event { color: var(--r-live); }
      .ref.concept { color: var(--r-referential); }
      .ref.synchronicity { color: var(--r-structural); }
      .ref.oracular-reading { color: var(--r-decorative); }

      /* contested register: show BOTH, side by side, no winner */
      .reg-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      .reg-row .also { font-family: var(--sans); font-size: 11px; color: var(--faint); }

      /* concept view — every synchronicity that resonates through one concept (backlinks) */
      .concept-head { margin-bottom: 18px; }
      .concept-head .k { font-family: var(--sans); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--faint); }
      .concept-head h2 { margin: 6px 0 4px; }
      .concept-head .count { font-family: var(--sans); font-size: 12.5px; color: var(--muted); font-style: italic; }

      /* composer — "capture a synchronicity", not a data-entry form */
      .compose-bar { margin: 28px 0 8px; }
      .compose-bar button {
        background: none; border: 1px dashed var(--thread); color: var(--accent);
        border-radius: 10px; padding: 11px 18px; font-family: var(--sans); font-size: 13px; width: 100%;
      }
      .compose-bar button:hover { background: var(--accent-soft); }
      .composer { display: none; margin: 8px 0 24px; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 22px; }
      .composer.open { display: block; }
      .composer h3 { font-weight: 400; font-size: 17px; margin: 0 0 4px; }
      .composer .lede { font-family: var(--sans); font-size: 12.5px; color: var(--muted); font-style: italic; margin: 0 0 16px; }
      .field { margin: 14px 0; }
      .field label { display: block; font-family: var(--sans); font-size: 12px; color: var(--muted); margin-bottom: 5px; }
      .field .help { font-family: var(--sans); font-size: 11px; color: var(--faint); font-style: italic; margin-top: 3px; }
      .field input, .field textarea {
        width: 100%; background: var(--bg); color: var(--ink); border: 1px solid var(--line);
        border-radius: 8px; padding: 9px 11px; font-family: var(--serif); font-size: 15px;
      }
      .field textarea { resize: vertical; min-height: 64px; line-height: 1.5; }
      /* register chooser — four textures, chosen not scored */
      .regchoose { display: flex; flex-wrap: wrap; gap: 8px; }
      .regchoose label { display: inline-flex; align-items: center; gap: 0; margin: 0; cursor: pointer; }
      .regchoose input { position: absolute; opacity: 0; width: 0; height: 0; }
      .regchoose .opt {
        font-family: var(--sans); font-size: 12px; padding: 6px 12px; border-radius: 999px;
        border: 1px solid var(--line); color: var(--muted); background: var(--bg);
      }
      .regchoose .opt b { font-weight: 600; display: block; }
      .regchoose .opt small { color: var(--faint); font-size: 10.5px; }
      .regchoose input:checked + .opt { border-color: currentColor; }
      .regchoose label.structural input:checked + .opt { color: var(--r-structural); }
      .regchoose label.live-input input:checked + .opt { color: var(--r-live); }
      .regchoose label.referential input:checked + .opt { color: var(--r-referential); }
      .regchoose label.decorative input:checked + .opt { color: var(--r-decorative); }
      .composer .actions { margin-top: 18px; display: flex; gap: 10px; align-items: center; }
      .composer .actions button.save { background: var(--accent); color: #241a0e; border: 0; border-radius: 9px; padding: 9px 18px; font-family: var(--sans); font-weight: 600; }
      .composer .actions button.cancel { background: none; border: 0; color: var(--faint); font-family: var(--sans); font-size: 13px; }
      .pending { margin-top: 16px; font-family: var(--sans); font-size: 12.5px; color: var(--muted); }
      .pending pre { background: var(--bg); border: 1px solid var(--line); border-radius: 8px; padding: 11px; overflow-x: auto; white-space: pre-wrap; font-size: 11.5px; color: var(--faint); }
      .pending .ok { color: var(--r-live); }
      .pending .await { color: var(--accent); }

      .empty { color: var(--faint); font-style: italic; padding: 40px 0; text-align: center; }
      .footer-note { margin-top: 40px; padding-top: 18px; border-top: 1px solid var(--line);
                     font-family: var(--sans); font-size: 11.5px; color: var(--faint); font-style: italic; line-height: 1.7; }
    </style>
  </head>
  <body>
    <!-- ── SAMPLE DATA (shown only when not connected) ──────────────────────────── -->
    <script>
      const SAMPLE = [
        {
          id: "synchronicity:the-red-door",
          what: "Dreamt of a red door I couldn't open. Next morning the used bookshop I'd walked past for years — never once entered — had painted its door red overnight.",
          register: ["structural"],
          "noticed-at": "2026-06-28",
          rhyme: "A threshold that appeared in sleep, then stood in the street asking to be crossed.",
          tension: "I still didn't go in. Not sure if the sync was the invitation or my not accepting it.",
          "composed-of": [
            { entity: "event:the-red-door-dream" },
            { entity: "event:the-bookshop-door" },
          ],
          resonance: [
            { entity: "concept:doorways" },
            { entity: "synchronicity:the-number-again" },
          ],
        },
        {
          id: "synchronicity:the-number-again",
          what: "11:11 on the clock, then the receipt total was $11.11, then a stranger's shirt said 11. Three times before noon.",
          register: ["decorative", "referential"], // contested: two sessions, both stand
          "noticed-at": "2026-06-22",
          rhyme: "The same small number leaning in from three unrelated places.",
          tension: "",
          "composed-of": [{ entity: "event:the-clock-1111" }, { entity: "event:the-receipt" }],
          resonance: [{ entity: "concept:the-number-11" }, { entity: "concept:doorways" }],
        },
        {
          id: "synchronicity:the-cast-cards",
          what: "Pulled The Tower reversed the morning before the layoff email arrived. Read it after, not before — the reading and the news rhymed backward.",
          register: ["live-input"],
          "noticed-at": "2026-06-15",
          rhyme: "A structure coming down, drawn from the deck and delivered by the world within the hour.",
          tension: "Comforting and unsettling at once — did the pull prepare me, or only frame what was coming?",
          "composed-of": [{ entity: "oracular-reading:the-tower-reversed" }, { entity: "event:the-layoff-email" }],
          resonance: [{ entity: "concept:doorways" }],
        },
      ];
    </script>
    <!-- ── END SAMPLE ───────────────────────────────────────────────────────────── -->

    <header>
      <div class="mark"><b>Synchronicity</b> Journal</div>
      <div class="tagline">meaningful coincidences, received as they come</div>
      <div class="mode" id="mode">mode: —</div>
    </header>
    <div id="notice" class="notice" style="display:none"></div>

    <main>
      <div class="compose-bar">
        <button id="openCompose">＋ Capture a synchronicity</button>
      </div>
      <div class="composer" id="composer"></div>
      <div class="stream" id="stream"></div>
      <div class="footer-note" id="footerNote"></div>
    </main>

    <div class="veil" id="veil"></div>
    <aside class="sheet" id="sheet"><div class="inner" id="sheetInner"></div></aside>

    <script>
      // ── Data source: Claude snapshot, standalone endpoint, or sample. Never blank. ──
      const endpoint = window.CHORUS_ENDPOINT || null;
      let entries = Array.isArray(window.CHORUS_DATA) ? window.CHORUS_DATA : null;
      const mode = entries ? "claude" : endpoint ? "standalone" : "sample";
      if (!entries) entries = SAMPLE.map((e) => JSON.parse(JSON.stringify(e)));

      document.getElementById("mode").textContent = "mode: " + mode;
      if (mode === "sample") {
        const n = document.getElementById("notice");
        n.style.display = "block";
        n.textContent =
          "Not connected — showing a few sample entries. Ask Claude to open your journal, or set window.CHORUS_ENDPOINT to run standalone.";
      }

      const REGISTERS = {
        structural:  { kind: "a hinge — it reorganized something" },
        "live-input":{ kind: "input you're answering" },
        referential: { kind: "it points elsewhere" },
        decorative:  { kind: "it rhymed lightly, and stayed" },
      };
      const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
      const byId = (id) => entries.find((e) => e.id === id);
      const asArray = (v) => (v == null ? [] : Array.isArray(v) ? v : [v]);
      const refType = (id) => String(id || "").split(":")[0] || "entity";
      const refSlug = (id) => {
        const s = String(id || "").split(":").slice(1).join(":");
        return s.replace(/-/g, " ").replace(/\b\w/g, (c) => c.toUpperCase());
      };

      // ── Register tag: shows the KIND of meaning. Contested → both, dashed, no winner. ──
      function registerTag(reg, compact) {
        const list = asArray(reg).filter(Boolean);
        if (!list.length) return '<span class="reg unregistered"><span class="lbl">unregistered</span></span>';
        const contested = list.length > 1 ? " contested" : "";
        return list
          .map((r, i) => {
            const meta = REGISTERS[r];
            const kind = !compact && meta ? '<span class="kind">' + esc(meta.kind) + "</span>" : "";
            const also = i > 0 ? '<span class="also">· also read as</span>' : "";
            return also + '<span class="reg ' + esc(r) + contested + '"><span class="lbl">' + esc(r) + "</span>" + kind + "</span>";
          })
          .join(" ");
      }

      function whenLabel(e) {
        const d = e["noticed-at"];
        if (!d) return "undated";
        try {
          return new Date(d).toLocaleDateString(undefined, { year: "numeric", month: "long", day: "numeric" });
        } catch { return d; }
      }

      // ── The stream ──
      function renderStream() {
        const el = document.getElementById("stream");
        const sorted = entries.slice().sort((a, b) => String(b["noticed-at"] || "").localeCompare(String(a["noticed-at"] || "")));
        if (!sorted.length) { el.innerHTML = '<div class="empty">Nothing noticed yet. When something rhymes, capture it above.</div>'; return; }
        el.innerHTML = sorted
          .map((e) => {
            const res = asArray(e.resonance).length;
            const hint = res ? '<span class="rhymes-hint">rhymes with ' + res + (res === 1 ? " thing" : " things") + "</span>" : "";
            return (
              '<div class="entry" data-id="' + esc(e.id) + '">' +
                '<div class="when">' + esc(whenLabel(e)) + "</div>" +
                '<div class="what">' + esc(e.what || refSlug(e.id)) + "</div>" +
                '<div class="meta">' + registerTag(e.register, true) + hint + "</div>" +
              "</div>"
            );
          })
          .join("");
        el.querySelectorAll(".entry").forEach((n) => (n.onclick = () => openEntry(n.dataset.id)));
      }

      // ── Detail sheet for one synchronicity ──
      function openEntry(id) {
        const e = byId(id);
        if (!e) return;
        const composed = asArray(e["composed-of"]);
        const resonance = asArray(e.resonance);
        let html = '<button class="close" onclick="closeSheet()">×</button>';
        html += '<div class="when">' + esc(whenLabel(e)) + "</div>";
        html += "<h2>" + esc(e.what || refSlug(e.id)) + "</h2>";

        // register — as the kind of meaning, contested shown in full
        html += '<div class="section"><div class="h">the kind of meaning</div><div class="reg-row">' + registerTag(e.register, false) + "</div></div>";

        if (e.rhyme) html += '<div class="section"><div class="h">what rhymes</div><div class="prose">' + esc(e.rhyme) + "</div></div>";

        // composed-of — clickable refs
        if (composed.length) {
          html += '<div class="section"><div class="h">composed of</div><div class="refs">' + composed.map(refChip).join("") + "</div></div>";
        }
        // resonance — clickable refs; concepts open the backlink view
        if (resonance.length) {
          html += '<div class="section"><div class="h">resonates with</div><div class="refs">' + resonance.map(refChip).join("") + "</div></div>";
        }

        if (e.tension) html += '<div class="section"><div class="h">tension — left open</div><div class="prose tension">' + esc(e.tension) + "</div></div>";

        document.getElementById("sheetInner").innerHTML = html;
        wireRefs();
        showSheet();
      }

      function refChip(ref) {
        const id = ref && ref.entity ? ref.entity : ref;
        const t = refType(id);
        return '<a href="#" class="ref ' + esc(t) + '" data-ref="' + esc(id) + '">' +
               '<span class="kindmark">' + esc(t) + "</span>" + esc(refSlug(id)) + "</a>";
      }

      function wireRefs() {
        document.querySelectorAll(".ref[data-ref]").forEach((a) => {
          a.onclick = (ev) => {
            ev.preventDefault();
            const id = a.dataset.ref;
            const t = refType(id);
            if (t === "synchronicity" && byId(id)) return openEntry(id);
            // any other node (concept, event, reading, person) → reverse traversal: what resonates through it
            openConcept(id);
          };
        });
      }

      // ── Concept view: every synchronicity that resonates through this node (backlinks). ──
      // In Claude/standalone modes this is a `backlinks(target: id)` query; here we compute it
      // from the loaded set so the affordance works offline too.
      function openConcept(conceptId) {
        const back = entries.filter((e) =>
          asArray(e.resonance).some((r) => (r && r.entity ? r.entity : r) === conceptId) ||
          asArray(e["composed-of"]).some((r) => (r && r.entity ? r.entity : r) === conceptId)
        );
        // let the runtime enrich this if it wants deeper backlinks than the loaded page holds
        window.dispatchEvent(new CustomEvent("chorus:backlinks", { detail: { target: conceptId } }));

        let html = '<button class="close" onclick="closeSheet()">×</button>';
        html += '<div class="concept-head"><div class="k">' + esc(refType(conceptId)) + "</div>";
        html += "<h2>" + esc(refSlug(conceptId)) + "</h2>";
        html += '<div class="count">' + (back.length
          ? back.length + " synchronicit" + (back.length === 1 ? "y rhymes" : "ies rhyme") + " through this"
          : "nothing points here yet") + "</div></div>";

        html += '<div class="stream">' + back
          .sort((a, b) => String(b["noticed-at"] || "").localeCompare(String(a["noticed-at"] || "")))
          .map((e) =>
            '<div class="entry" data-id="' + esc(e.id) + '">' +
              '<div class="when">' + esc(whenLabel(e)) + "</div>" +
              '<div class="what">' + esc(e.what || refSlug(e.id)) + "</div>" +
              '<div class="meta">' + registerTag(e.register, true) + "</div>" +
            "</div>"
          ).join("") + "</div>";

        document.getElementById("sheetInner").innerHTML = html;
        document.querySelectorAll("#sheetInner .entry").forEach((n) => (n.onclick = () => openEntry(n.dataset.id)));
        showSheet();
      }

      function showSheet() {
        document.getElementById("veil").classList.add("open");
        document.getElementById("sheet").classList.add("open");
      }
      function closeSheet() {
        document.getElementById("veil").classList.remove("open");
        document.getElementById("sheet").classList.remove("open");
      }
      window.closeSheet = closeSheet;
      document.getElementById("veil").onclick = closeSheet;
      document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeSheet(); });

      // ── Composer — "capture a synchronicity". Reception framing, no confidence/skeptic UI. ──
      function renderComposer() {
        const regs = Object.entries(REGISTERS)
          .map(([r, meta]) =>
            '<label class="' + r + '"><input type="radio" name="register" value="' + r + '" />' +
            '<span class="opt"><b>' + r + "</b><small>" + esc(meta.kind) + "</small></span></label>"
          ).join("");
        document.getElementById("composer").innerHTML =
          "<h3>Something rhymed.</h3>" +
          '<div class="lede">Write it as you noticed it. No need to justify it or weigh it against chance — this journal records what carried meaning, not what would survive a skeptic.</div>' +
          '<form id="capf">' +
            '<div class="field"><label>What happened?</label>' +
              '<textarea name="what" placeholder="Two things that shouldn\'t have met, met…" required></textarea></div>' +

            '<div class="field"><label>The kind of meaning it carried</label>' +
              '<div class="regchoose">' + regs + "</div>" +
              '<div class="help">Register is texture, not a score. Choose the kind — leave it unregistered if you\'re not sure yet.</div></div>' +

            '<div class="field"><label>What does it rhyme with? — the shape of the echo</label>' +
              '<input name="rhyme" placeholder="A doorway, again. A number leaning in." /></div>' +

            '<div class="field"><label>Composed of — the events it\'s made of</label>' +
              '<input name="composed" placeholder="event:the-red-door-dream, event:the-bookshop-door" />' +
              '<div class="help">Entity references, comma-separated. Name events/entities the store can hold beliefs about — they become clickable and traversable.</div></div>' +

            '<div class="field"><label>Resonates with — the syncs & concepts it echoes</label>' +
              '<input name="resonance" placeholder="concept:doorways, synchronicity:the-number-again" />' +
              '<div class="help">References to concept: or synchronicity: nodes. Clicking a concept later shows every sync that rhymes through it.</div></div>' +

            '<div class="field"><label>Tension — anything left open (optional)</label>' +
              '<textarea name="tension" placeholder="The part that doesn\'t resolve. It\'s allowed to stay unresolved."></textarea></div>' +

            '<div class="actions"><button type="submit" class="save">Receive it into the journal</button>' +
              '<button type="button" class="cancel" onclick="toggleComposer(false)">not now</button></div>' +
            '<div class="pending" id="pending"></div>' +
          "</form>";
        wireComposer();
      }

      function parseRefs(s) {
        return String(s || "")
          .split(",").map((x) => x.trim()).filter(Boolean)
          .map((id) => ({ entity: id.includes(":") ? id : "concept:" + id.replace(/\s+/g, "-").toLowerCase() }));
      }
      function slugify(s) {
        return String(s || "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "").slice(0, 60) || "untitled";
      }

      function wireComposer() {
        const form = document.getElementById("capf");
        form.onsubmit = (ev) => {
          ev.preventDefault();
          const d = Object.fromEntries(new FormData(form).entries());
          const slug = "synchronicity:" + slugify((d.what || "").split(/[.!?\n]/)[0]);
          const nowISO = new Date().toISOString().slice(0, 10);
          const composed = parseRefs(d.composed);
          const resonance = parseRefs(d.resonance);

          // Build the exact chorus writes — references for composed-of/resonance, declared sets.
          const writes = [];
          if (d.what) writes.push(w(slug, "what", d.what, "observation"));
          if (d.register) writes.push(w(slug, "register", d.register, "observation"));
          writes.push(w(slug, "noticed-at", nowISO, "observation"));
          if (d.rhyme) writes.push(w(slug, "rhyme", d.rhyme, "observation"));
          if (d.tension) writes.push(w(slug, "tension", d.tension, "observation"));
          composed.forEach((r) => writes.push(w(slug, "composed-of", r, "observation")));
          resonance.forEach((r) => writes.push(w(slug, "resonance", r, "observation")));

          const pending = document.getElementById("pending");
          pending.innerHTML = "<pre>" + esc(JSON.stringify(writes.map(unwrap), null, 2)) + "</pre>";
          window.CHORUS_PENDING = (window.CHORUS_PENDING || []).concat(writes.map(unwrap));
          window.dispatchEvent(new CustomEvent("chorus:write", { detail: writes.map(unwrap) }));

          // optimistic add to the stream so the page never feels dead
          if (!byId(slug)) {
            entries.push({
              id: slug, what: d.what, register: d.register ? [d.register] : [],
              "noticed-at": nowISO, rhyme: d.rhyme || "", tension: d.tension || "",
              "composed-of": composed, resonance,
            });
            renderStream();
          }

          if (mode === "standalone") {
            pending.innerHTML += '<div class="await">saving to your node…</div>';
            Promise.all(writes.map((x) => mcpCall(x.tool, x.args)))
              .then(() => (pending.innerHTML += '<div class="ok">received.</div>'))
              .catch((err) => (pending.innerHTML += '<div>' + esc(String(err)) + "</div>"));
          } else {
            pending.innerHTML += '<div class="await">These are ready. Ask Claude to save them (or say "save").</div>';
          }
        };
      }

      // helper: a write carries {tool, args}; args.value may be a ref object.
      function w(about, attribute, value, kind) {
        return { tool: "remember", args: { about, attribute, value, kind, speaker: "user" } };
      }
      const unwrap = (x) => x; // writes are already plain; kept for symmetry / future shaping

      async function mcpCall(tool, args) {
        const res = await fetch(endpoint.url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Mcp-Session-Id": endpoint.session || "",
            Authorization: "Bearer " + endpoint.token,
          },
          body: JSON.stringify({ jsonrpc: "2.0", id: Date.now(), method: "tools/call", params: { name: tool, arguments: args } }),
        });
        return res.json();
      }

      function toggleComposer(open) {
        const c = document.getElementById("composer");
        const willOpen = open === undefined ? !c.classList.contains("open") : open;
        c.classList.toggle("open", willOpen);
        if (willOpen && !c.dataset.built) { renderComposer(); c.dataset.built = "1"; }
        if (willOpen) c.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }
      window.toggleComposer = toggleComposer;
      document.getElementById("openCompose").onclick = () => toggleComposer();

      document.getElementById("footerNote").innerHTML =
        "This journal defaults to <b>reception</b>. A deflationary account — base rates, priming, " +
        "coincidence — is always available for anything here; applying it by reflex is a bias toward " +
        "dismissal, so it isn't applied. What's recorded is meaning, graded by the <i>kind</i> it carried, " +
        "never by the odds of surviving a skeptic. Where a reading is contested, both stand.";

      renderStream();
    </script>
  </body>
</html>
